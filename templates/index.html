<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Linguahe - Linguistic Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="main-content">
      <header class="header-bar">Linguahe</header>

      <div class="container mx-auto">
        <div class="flex-container-main">
          <div class="card-box">
            <div class="flex justify-between items-center mb-4">
              <p class="text-sm font-bold text-sky-600 uppercase">Transcript</p>
              <select id="languageSelect" class="text-xs border rounded p-1">
                <option value="tl">Tagalog / Filipino</option>
                <option value="ilo">Ilocano</option>
                <option value="ceb">Cebuano</option>
              </select>
            </div>

            <div class="transcript-container">
              <div id="highlightLayer" class="textarea-main"></div>
              <textarea
                id="inputText"
                class="textarea-main"
                placeholder="Record audio..."
              ></textarea>
            </div>

            <div class="mt-4 flex items-center gap-2">
              <input type="checkbox" id="noiseToggle" class="w-4 h-4" />
              <label
                for="noiseToggle"
                class="text-xs font-semibold text-gray-600"
                >Noise Suppression</label
              >
            </div>
          </div>

          <div class="card-box">
            <p class="text-sm font-bold text-sky-600 mb-4 uppercase">
              Diagnostic Analysis
            </p>
            <div class="explanation-box" id="explanationBox">
              <p class="text-gray-400 italic">Analysis will appear here...</p>
            </div>
          </div>
        </div>

        <div
          class="flex flex-col items-center justify-center mt-12 mb-10 gap-4 w-full relative"
          style="z-index: 10"
        >
          <button id="micBtn" class="mic-button">🎤</button>
          <p class="text-sm text-gray-500 font-bold" id="statusText">
            Tap to Record (5s)
          </p>

          <div class="flex gap-4 items-center mt-2">
            <button
              id="downloadBtn"
              class="bg-sky-100 text-sky-700 px-6 py-2 rounded-lg text-sm font-bold hover:bg-sky-200 transition"
            >
              Download Report
            </button>
            <button
              id="clearBtn"
              class="text-gray-400 hover:text-red-500 text-sm font-bold"
            >
              Clear All
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer-bar">&copy; 2026 Linguahe Team</footer>

    <script>
      let recorder;
      let audioChunks = [];
      const micBtn = document.getElementById("micBtn");
      const statusText = document.getElementById("statusText");

      async function startRecording() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          recorder = new MediaRecorder(stream);
          audioChunks = [];

          micBtn.innerHTML = "⏹️";
          micBtn.classList.add("recording");
          statusText.innerText = "Listening to audio input...";

          recorder.ondataavailable = (e) => audioChunks.push(e.data);
          recorder.onstop = async () => {
            micBtn.innerHTML = "🎤";
            micBtn.classList.remove("recording");
            statusText.innerText = "Analyzing linguistic markers...";

            const blob = new Blob(audioChunks, { type: "audio/wav" });
            const formData = new FormData();
            formData.append("audio", blob);
            formData.append(
              "language",
              document.getElementById("languageSelect").value,
            );
            formData.append(
              "noise_suppression",
              document.getElementById("noiseToggle").checked,
            );

            try {
              const tResp = await fetch("/transcribe", {
                method: "POST",
                body: formData,
              });
              const tData = await tResp.json();

              if (tData.highlighted_text) {
                document.getElementById("inputText").value =
                  tData.original_text;
                document.getElementById("highlightLayer").innerHTML =
                  tData.highlighted_text;

                const aResp = await fetch("/analyze", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    conversation: tData.original_text,
                    diction_score: tData.diction_score,
                  }),
                });
                const aData = await aResp.json();
                document.getElementById("explanationBox").innerHTML =
                  aData.explanation;
                statusText.innerText = "Diagnostic Analysis Complete!";
              }
            } catch (e) {
              statusText.innerText = "Connection error. Please restart server.";
            }
          };

          recorder.start();
          setTimeout(() => {
            if (recorder.state === "recording") recorder.stop();
          }, 5000);
        } catch (err) {
          alert("Microphone access denied.");
        }
      }

      micBtn.addEventListener("click", () => {
        if (recorder && recorder.state === "recording") recorder.stop();
        else startRecording();
      });

      document.getElementById("clearBtn").addEventListener("click", () => {
        if (confirm("Clear current session?")) location.reload();
      });

      document.getElementById("downloadBtn").addEventListener("click", () => {
        const transcript = document.getElementById("inputText").value;
        const analysisHTML =
          document.getElementById("explanationBox").innerHTML;
        const lang =
          document.getElementById("languageSelect").options[
            document.getElementById("languageSelect").selectedIndex
          ].text;

        if (!transcript || transcript.trim() === "") {
          alert("No data available to download.");
          return;
        }

        const cleanAnalysis = analysisHTML
          .replace(/<[^>]*>/g, "\n")
          .replace(/\n\n+/g, "\n");
        const reportContent =
          `LINGUAHE LINGUISTIC DIAGNOSTIC REPORT\n` +
          `Generated: ${new Date().toLocaleString()}\n` +
          `Language: ${lang}\n` +
          `------------------------------------------\n\n` +
          `TRANSCRIPT:\n"${transcript}"\n\n` +
          `FINDINGS:\n${cleanAnalysis}\n` +
          `------------------------------------------\n` +
          `System: Linguahe Engine v1.0`;

        const blob = new Blob([reportContent], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Linguahe_Report.txt`;
        a.click();
        URL.revokeObjectURL(url);
      });
      
      const inputArea = document.getElementById("inputText");
      const highlightArea = document.getElementById("highlightLayer");

      inputArea.addEventListener("scroll", () => {
        highlightArea.scrollTop = inputArea.scrollTop;
      });
    </script>
  </body>
</html>
