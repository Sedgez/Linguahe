<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linguahe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-gray-200 min-h-screen">

    <!-- Header -->
    <header class="header-bar">
        Linguahe
    </header>

    <div class="container mx-auto px-4 py-10">

        <!-- Language Section -->
        <div class="flex flex-col md:flex-row items-center justify-center gap-6">

            <!-- Input Box -->
            <div class="card-box">
                <select class="dropdown">
                    <option>Language #1</option>
                    <option>English</option>
                    <option>Ilocano</option>
                </select>

                <textarea 
                    placeholder="Enter conversation..."
                    class="textarea-main">
                </textarea>
            </div>

            <!-- Swap Icon -->
            <div class="swap-icon hidden md:block">
                ⇄
            </div>

            <!-- Output Box -->
            <div class="card-box">
                <select class="dropdown">
                    <option>Language #2</option>
                    <option>Ilocano</option>
                    <option>Filipino</option>
                </select>

                <textarea 
                    placeholder="Processed output..."
                    class="textarea-main bg-gray-100"
                    readonly>
                </textarea>
            </div>

        </div>

        <!-- Mic Button -->
        <div class="flex justify-center mt-8">
            <button class="mic-button">
                🎤
            </button>
        </div>

        <!-- Explanation Section -->
        <div class="mt-12">
            <div class="explanation-tab">
                Explanation
            </div>

            <div class="explanation-box">
                {% if result %}
                    <p>{{ result }}</p>
                {% else %}
                    <p class="text-gray-500">System explanation will appear here.</p>
                {% endif %}
            </div>
        </div>

    </div>

</body>
</html>
